name: Release patched Istio images

on:
  workflow_dispatch:
    inputs:
      tag:
        description: "Istio upstream tag (e.g. 1.29.0)"
        required: true

permissions:
  contents: read
  packages: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout upstream Istio tag
        uses: actions/checkout@v4
        with:
          repository: istio/istio
          ref: ${{ github.event.inputs.tag }}
          fetch-depth: 0

      - name: Add and fetch fork branch
        run: |
          git remote add fork https://github.com/${{ github.repository }}.git
          git fetch fork feature/label-filtered-network-gateway

      - name: Merge feature branch
        run: |
          git merge --no-edit fork/feature/label-filtered-network-gateway

      - name: Create and push patched tag
        env:
          TAG: ${{ github.event.inputs.tag }}-streamx
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          git tag "$TAG"
          git push https://x-access-token:${GITHUB_TOKEN}@github.com/${{ github.repository }}.git "$TAG"

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set HUB and TAG variables
        id: vars
        run: |
          echo "hub=ghcr.io/${GITHUB_REPOSITORY}" >> $GITHUB_OUTPUT
          echo "tag=${{ github.event.inputs.tag }}-streamx" >> $GITHUB_OUTPUT

      - name: Build and push Istio images
        env:
          HUB: ${{ steps.vars.outputs.hub }}
          TAG: ${{ steps.vars.outputs.tag }}
        run: |
          set -euo pipefail
          echo "HUB=$HUB"
          echo "TAG=$TAG"

          make docker
          make docker.push